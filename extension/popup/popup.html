<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEATS Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="../icons/logo48.png" alt="" class="logo">
      <div class="header-text">
        <h1>KEATS Downloader</h1>
        <span class="subtitle">Download course materials in one click</span>
      </div>
      <label class="toggle" title="Toggle dark mode">
        <input type="checkbox" id="theme-toggle">
        <span class="toggle-slider">
          <svg class="toggle-icon sun" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="toggle-icon moon" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
        </span>
      </label>
    </header>

    <!-- Not on course page -->
    <div id="not-keats" class="card hidden">
      <div class="empty-state">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35">
          <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
          <path d="M12 8v4M12 16h.01"/>
        </svg>
        <p>Open a <strong>KEATS course page</strong> to get started</p>
        <span class="hint">Also works with other Moodle-based platforms</span>
      </div>
    </div>

    <!-- Ready -->
    <div id="ready" class="card hidden">
      <div class="course-info">
        <label>Course</label>
        <p id="course-name" class="course-name"></p>
        <div class="stats-row">
          <div class="stat">
            <span class="stat-value" id="section-count">0</span>
            <span class="stat-label">Sections</span>
          </div>
        </div>
      </div>

      <div class="options">
        <h3>Download Options</h3>
        <label class="checkbox-row">
          <input type="checkbox" id="opt-materials" checked>
          <span>Course materials (PDFs, slides, files)</span>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" id="opt-videos">
          <span>Include videos in weekly sections (Kaltura)</span>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" id="opt-captures">
          <span>Lecture capture recordings (Echo360)</span>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" id="opt-folders" checked>
          <span>Include folder contents</span>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" id="opt-optional">
          <span>Include optional resources</span>
        </label>
      </div>

      <button id="btn-download" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download All
      </button>
    </div>

    <!-- Progress -->
    <div id="progress" class="card hidden">
      <div class="progress-header">
        <span id="progress-status" class="status-badge">Scanning</span>
        <span id="progress-count" class="progress-count"></span>
      </div>
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
      </div>
      <p id="current-file" class="current-file"></p>
      <div id="log-container" class="log-container">
        <div id="log" class="log"></div>
      </div>
      <button id="btn-cancel" class="btn-secondary">Cancel</button>
    </div>

    <!-- Complete -->
    <div id="complete" class="card hidden">
      <div class="complete-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" stroke="currentColor" class="check-circle"/>
          <polyline points="9 12 11.5 14.5 16 9" stroke="currentColor" class="check-mark"/>
        </svg>
      </div>
      <h2 id="complete-title">Download Complete</h2>
      <div class="stats-row">
        <div class="stat">
          <span class="stat-value" id="stat-downloaded">0</span>
          <span class="stat-label">Downloaded</span>
        </div>
        <div class="stat">
          <span class="stat-value stat-error" id="stat-failed">0</span>
          <span class="stat-label">Failed</span>
        </div>
      </div>
      <p class="save-path">Saved to <strong>Downloads/KEATS Downloads/</strong></p>
      <button id="btn-done" class="btn-primary">Done</button>
    </div>

    <footer>
      <a href="https://github.com/Saif-AD" target="_blank" class="github-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
        Saif-AD
      </a>
      <span class="version">v1.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
